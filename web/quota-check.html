<!doctype html>
<meta charset="utf-8"/>
<title>quota / host check</title>
<pre id="out">checking…</pre>
<script>
(async () => {
  const out = document.getElementById('out');
  const lines = [];
  const host = location.hostname;
  const base = `http://${host}:3091`;
  lines.push('page=' + location.href);
  try {
    const cfg = await fetch('/quota-config.json', {cache:'no-store'}).then(r=>r.json());
    lines.push('config=' + JSON.stringify(cfg));
  } catch (e) { lines.push('config error: ' + e); }
  const stale = localStorage.getItem('codeg.quota.apiUrl');
  lines.push('localStorage.apiUrl=' + JSON.stringify(stale));
  if (stale && /127\.0\.0\.1|localhost|\[::1\]/.test(stale) && host !== '127.0.0.1' && host !== 'localhost') {
    localStorage.removeItem('codeg.quota.apiUrl');
    lines.push('cleared stale loopback localStorage override');
  }
  for (const path of ['/health', '/host', '/summary']) {
    try {
      const r = await fetch(base + path, {cache:'no-store'});
      const j = await r.json();
      lines.push(path + ' OK: ' + JSON.stringify(j).slice(0, 300));
    } catch (e) {
      lines.push(path + ' FAILED: ' + e);
    }
  }
  out.textContent = lines.join('\n');
})();
</script>
